<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Provider Sessions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.16" rel="stylesheet" />
</head>
<body class="report-body standardized-listing-page">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
      <div class="report-brand">
          <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                  class="bi bi-x-lg"></i></button>
      </div>
      <nav class="report-nav"></nav>
  </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar">
      <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-broadcast-pin"></i></div>
                    <div>
                        <h1>Provider Sessions</h1>
                        <p>Monitor member game-provider sessions and settlement status.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
    </header>
    <section class="report-content">
      <!-- <div class="filter-card page-hero-card">
        <div class="user-toolbar">
          <div>
            <div class="eyebrow"><i class="bi bi-box-arrow-up-right"></i> Provider Session</div>
            <h2>Provider Sessions</h2>
          </div>
        </div>
      </div> -->
      <div class="filter-card">
        <div class="user-search-grid">
          <div class="field"><label>Member ID</label><input id="sessionMemberId" class="form-control" placeholder="Member ID"></div>
          <div class="field"><label>Provider Code</label><input id="sessionProviderCode" class="form-control" placeholder="Provider Code"></div>
          <div class="field"><label>Game ID</label><input id="sessionGameId" class="form-control" placeholder="Game ID"></div>
          <div class="field"><label>Status</label><select id="sessionStatus" class="form-select"><option value="">All Status</option><option>OPEN</option><option>CLOSED</option></select></div>
          <div class="field"><label>From</label><input id="sessionFrom" type="date" class="form-control"></div>
          <div class="field"><label>To</label><input id="sessionTo" type="date" class="form-control"></div>
          <div class="field"><label>&nbsp;</label><button id="sessionSearchBtn" class="btn-primary-clean w-100" type="button"><i class="bi bi-search"></i> Search</button></div>
        </div>
      </div>
      <div class="table-card">
        <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-box-arrow-up-right"></i><span>Session Records</span></div></div>
        <div class="table-wrap"><table class="report-table">
          <thead><tr><th>ID</th><th>Member</th><th>Provider</th><th>Game</th><th>Launch Type</th><th>Transfer</th><th>Transfer Back</th><th>Status</th><th>Started</th><th>Ended</th></tr></thead>
          <tbody id="sessionBody"><tr><td colspan="10">Loading...</td></tr></tbody>
        </table></div>
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2"><button class="clean-btn" id="sessionPrevBtn" type="button">Previous</button><span id="sessionPager" class="text-muted small"></span><button class="clean-btn" id="sessionNextBtn" type="button">Next</button></div>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.10"></script>
<script src="assets/js/auth.js?v=1.0.11"></script>
<script src="assets/js/reports.js?v=1.0.6"></script>
<script src="assets/js/player-provider-session.js"></script>
  <script src="assets/js/bo-date-range.js?v=1.0.2"></script>
</body>
</html>
