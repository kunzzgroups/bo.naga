  </head>
  <body class="report-body">
    <div class="report-shell">
      <aside class="report-sidebar" id="reportSidebar">
        <div class="report-brand">
          <div>Backoffice<br /><small>Admin Panel</small></div>
          <button class="close-side" data-close-sidebar><i class="bi bi-x-lg"></i></button>
        </div>
        <nav class="report-nav">
          
          <a href="admin-user.html"><span><i class="bi bi-shield-lock me-2"></i>Admin Management</span></a>
          <div class="nav-group open"><button type="button" class="nav-group-btn"><span><i class="bi bi-person-badge me-2"></i>Access Control</span><i class="bi bi-chevron-down"></i></button><div class="nav-group-list"><a href="role.html" class="report-sub"><span><i class="bi bi-person-badge me-2"></i>Role</span></a><a href="menu-permission.html" class="report-sub"><span><i class="bi bi-menu-button-wide me-2"></i>Menu Permission</span></a><a href="account-lock.html" class="report-sub"><span><i class="bi bi-lock me-2"></i>Account Lock</span></a></div></div>
          <a href="language.html"><span><i class="bi bi-translate me-2"></i>Language & Translation</span></a>
          <a href="image-to-url.html"><span><i class="bi bi-image me-2"></i>Image To URL</span></a>

          <div class="nav-group open">
            <button type="button" class="nav-group-btn">
              <span><i class="bi bi-controller me-2"></i>Game Management</span><i class="bi bi-chevron-down"></i>
            </button>
            <div class="nav-group-list">
              <a href="game-category.html" class="report-sub"><span><i class="bi bi-grid-3x3-gap me-2"></i>Category</span></a>
              <a href="game-sub-category.html" class="report-sub active"><span><i class="bi bi-diagram-3 me-2"></i>Sub Category</span></a>
              <a href="game.html" class="report-sub"><span><i class="bi bi-joystick me-2"></i>Game</span></a>
            </div>
          </div>
          <a href="site-customize.html"><span><i class="bi bi-palette me-2"></i>Site Customize</span></a>
          <a href="layout-section.html"><span><i class="bi bi-code-square me-2"></i>Layout Section</span></a>
          
        </nav>
      </aside>
      <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
      <main class="report-main">
        <header class="report-topbar">
          <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
          <div><h1>Game Sub Category</h1></div>
          <div class="report-actions" data-bo-profile></div>
        </header>

        <section class="report-content">
          <div class="manage-page-grid">
            <div class="manage-form-card">
              <div class="section-title mb-3">
                <div>
                  <h3 id="subCategoryFormTitle">Create Sub Category</h3>
                </div>
              </div>

              <form id="subCategoryForm" class="slider-form">
                <input type="hidden" id="subCategoryId" name="id" />

                <div class="field">
                  <label>Parent Category</label>
                  <select id="subCategoryCategoryId" name="categoryId"></select>
                </div>
                <div class="field">
                  <label>Sub Category Name</label>
                  <input id="subCategoryName" name="name" type="text" placeholder="Example: Mini Game" />
                </div>
                <div class="field">
                  <label>Chinese Name</label>
                  <input id="subCategoryNameZh" name="nameZh" type="text" placeholder="Chinese sub category name" />
                </div>

                <div class="slider-two-col">
                  <div class="field">
                    <label>Sort Order</label>
                    <input id="subCategorySortOrder" name="sortOrder" type="number" min="0" value="0" />
                  </div>
                  <div class="field">
                    <label>Status</label>
                    <select id="subCategoryStatus" name="status">
                      <option value="1">Active</option>
                      <option value="2">Inactive</option>
                    </select>
                  </div>
                </div>

                <div class="slider-form-actions">
                  <button class="clean-btn primary" id="saveSubCategoryBtn" type="submit"><i class="bi bi-save"></i> Save Sub Category</button>
                  <button class="clean-btn" id="resetSubCategoryBtn" type="button"><i class="bi bi-arrow-counterclockwise"></i> Reset</button>
                </div>
                <div class="upload-status" id="subCategoryStatusBox"></div>
              </form>
            </div>

            <div class="manage-list-card">
              <div class="section-title slider-list-title">
                <div><h2>Sub Category List</h2></div>
                <div class="d-flex gap-2 flex-wrap">
                  <select class="manage-filter-select" id="subCategoryFilter"></select>
                  <button class="clean-btn" id="refreshSubCategoryBtn" type="button"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                </div>
              </div>
              <div class="slider-empty" id="subCategoryEmpty" hidden>
                <i class="bi bi-diagram-3"></i>
                <b>No sub categories found</b>
                <small>Create your first game sub category.</small>
              </div>
              <div class="manage-list" id="subCategoryList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="assets/js/config.js?v=1.0.10"></script>
    <script src="assets/js/auth.js?v=1.0.8"></script>
    <script src="assets/js/reports.js?v=1.0.1"></script>
    <script src="assets/js/dynamic-translation.js?v=1.0.4"></script>
    <script src="assets/js/game-sub-category.js?v=1.0.2"></script>
      <script src="assets/js/dynamic-translation-init.js?v=1.0.0"></script>
  </body>
</html>
