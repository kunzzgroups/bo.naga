<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Lock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.26" rel="stylesheet" />
</head>

<body class="report-body standardized-listing-page" data-access-page="account-lock">
    <div class="report-shell">
        <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i

            </div>
            <nav class="report-nav"></nav>
        </aside>
        <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
        <main class="report-main">
            <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-shield-lock"></i></div>
                    <div>
                        <h1>Account Lock</h1>
                        <p>Review and manage locked administrator accounts.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
            </header>
            <section class="report-content">
                <div class="access-card">
                    <div class="table-wrap">
                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th>Member</th>
                                    <th>Status</th>
                                    <th>Action</th>

                            </thead>
                            <tbody id="lockTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/config.js?v=1.0.14"></script>
