<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="assets/css/reports.css?v=1.0.25" rel="stylesheet" />
</head>
<body class="report-body">
  <div class="report-shell">
    <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
    <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
    
    <main class="report-main">
      <header class="report-topbar">
        <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-key"></i></div>
                    <div>
                        <h1>Change Password</h1>
                        <p>Update your administrator account password securely.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
      </header>
      <section class="report-content">
        <div class="admin-wide-section">
          <div class="admin-form-card admin-wide-card admin-password-card">
            <div class="admin-card-head">
              <div>
                <h2>Change Password</h2>
                <p>Enter your current password, then set a new password with minimum 8 characters.</p>
              </div>
              <div class="admin-card-icon"><i class="bi bi-key"></i></div>
            </div>
            <form id="changePasswordForm">
              <div class="admin-create-form-grid three">
                <div class="admin-field">
                  <label>Current Password</label>
                  <input class="form-control" id="currentPassword" type="password" required>
                </div>
                <div class="admin-field">
                  <label>New Password</label>
                  <input class="form-control" id="newPassword" type="password" minlength="8" required>
                </div>
                <div class="admin-field">
                  <label>Confirm New Password</label>
                  <input class="form-control" id="confirmPassword" type="password" minlength="8" required>
                </div>
              </div>
              <!-- <div class="admin-security-note"><i class="bi bi-shield-check"></i><span>Secure Password Encryption</span></div> -->
              <div class="upload-status mb-3" id="changePasswordStatus"></div>
              <button class="clean-btn primary" type="submit"><i class="bi bi-key"></i> Change Password</button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js?v=1.0.14"></script>
  <script src="assets/js/reports.js?v=1.0.9"></script>
  <script src="assets/js/auth.js?v=1.0.13"></script>
  <script src="assets/js/change-password.js?v=1.0.0"></script>
</body>
</html>
