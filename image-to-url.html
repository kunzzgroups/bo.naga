<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Image To URL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.24" rel="stylesheet" />
  </head>
  <body class="report-body">
    <div class="report-shell">
      <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
      <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
      <main class="report-main">
        <header class="report-topbar">
          <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-link-45deg"></i></div>
                    <div>
                        <h1>Image To URL</h1>
                        <p>Upload images and generate reusable public URLs.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
        </header>
        <section class="report-content">
          <div class="image-url-card">
            <div class="image-url-head">
              <div>
                <h2>Image To URL</h2>
                <p>Image Max Width: <b>1500 px</b></p>
              </div>
            </div>

            <div class="upload-drop-zone" id="dropZone">
              <input type="file" id="imageInput" accept="image/*" />
              <div class="upload-help"><i class="bi bi-cloud-arrow-up"></i><strong>Choose image or drag image here</strong></div>
              <small>JPG, PNG, GIF, WEBP accepted. The API will return a public URL.</small>
            </div>

            <div class="upload-preview-wrap" id="previewWrap" hidden>
              <img id="imagePreview" alt="Uploaded preview" />
              <div><b id="fileNameText">Selected image</b><small id="fileSizeText"></small></div>
            </div>

            <div class="upload-actions-row">
              <button class="clean-btn primary" id="uploadBtn" type="button"><i class="bi bi-upload"></i> Upload Image</button>
              <button class="clean-btn" id="clearBtn" type="button"><i class="bi bi-x-circle"></i> Clear</button>
            </div>

            <div class="upload-status" id="uploadStatus"></div>

            <div class="image-url-result">
              <label>Uploaded Image URL</label>
              <div class="copy-row">
                <input id="imageUrl" type="text" placeholder="https://static.yourdomain.com/media/image.png" readonly />
                <button class="copy-btn" id="copyUrlBtn" type="button">COPY</button>
              </div>
            </div>

            <div class="image-url-result">
              <label>CSS Background Code</label>
              <div class="copy-row copy-row-textarea">
                <textarea id="cssCode" rows="3" readonly placeholder="background-image: url('...');"></textarea>
                <button class="copy-btn" id="copyCssBtn" type="button">COPY</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="assets/js/config.js?v=1.0.14"></script>
    <script src="assets/js/auth.js?v=1.0.13"></script>
    <script src="assets/js/reports.js?v=1.0.7"></script>
    <script src="assets/js/image-to-url.js?v=1.0.1"></script>
  </body>
</html>
