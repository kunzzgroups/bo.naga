<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Language & Translation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.16" rel="stylesheet" />
</head>
<body class="report-body standardized-listing-page">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-translate"></i></div>
                    <div>
                        <h1>Language &amp; Translation</h1>
                        <p>Manage supported languages and translated content.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div></header>
    <section class="report-content">
      <div class="row g-4">
        <div class="col-lg-4">
          <div class="manage-form-card">
            <div class="section-title mb-3"><div><h2>Add / Update Language</h2></div></div>
            <form id="languageForm" class="slider-form">
              <label>Code</label><input id="langCode" class="form-control" placeholder="Example: zh" required><br>
              <label>Name</label><input id="langName" class="form-control" placeholder="Example: Chinese" required><br>
              <label>Sort Order</label><input id="langSort" class="form-control" type="number" value="0"><br>
              <label>Status</label><select id="langStatus" class="form-select"><option value="1">Active</option><option value="0">Inactive</option></select>
              <button class="clean-btn primary mt-3" type="submit"><i class="bi bi-save"></i> Save Language</button>
            </form>
            <div id="languageStatus" class="upload-status mt-2"></div>
          </div>
          <div class="manage-form-card mt-4"><div class="section-title mb-3"><div><h2>Languages</h2></div><button id="refreshLangBtn" class="clean-btn" type="button"><i class="bi bi-arrow-clockwise"></i></button></div><div id="languageList" class="translation-lang-list"></div></div>
        </div>
        <div class="col-lg-8">
          <div class="manage-form-card">
            <div class="section-title mb-3"><div><h2>Dynamic Content Translation</h2></div></div>
            <div class="row g-3">
              <div class="col-md-4"><label>Entity Type</label><select id="refType" class="form-select"><option value="slider">Slider</option><option value="game_category">Game Category</option><option value="game_sub_category">Game Sub Category</option><option value="game">Game</option><option value="bonus_category">Bonus Title</option><option value="bonus_category_item">Bonus Item</option><option value="main_layout">Main Layout</option></select></div>
              <div class="col-md-4"><label>Entity ID</label><input id="refId" class="form-control" type="number" placeholder="Example: 1"></div>
              <div class="col-md-4"><label>Fields</label><input id="fieldKeys" class="form-control" value="name,image,title,description" placeholder="name,image,title"></div>
            </div>
            <button id="loadTranslationBtn" class="clean-btn primary mt-3" type="button"><i class="bi bi-search"></i> Load Translation Fields</button>
            <div id="translationStatus" class="upload-status mt-2"></div>
            <div id="translationEditor" class="translation-editor mt-3"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.10"></script>
<script src="assets/js/reports.js?v=1.0.6"></script>
<script src="assets/js/auth.js?v=1.0.11"></script>
<script src="assets/js/language.js?v=1.0.1"></script>
</body>
</html>
