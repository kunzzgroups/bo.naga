<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Provider Bet Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.27" rel="stylesheet" />
</head>
<body class="report-body standardized-listing-page provider-bet-report-page">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar">
      <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-receipt"></i></div>
                    <div>
                        <h1>Provider Bet Report</h1>
                        <p>Review provider bet records, results and member activity.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
    </header>
    <section class="report-content">
      <!-- <div class="filter-card page-hero-card">
        <div class="user-toolbar">
          <div>
            <div class="eyebrow"><i class="bi bi-graph-up-arrow"></i> Provider Report</div>
            <h2>Provider Bet Report</h2>
          </div>
        </div>
      </div> -->
      <div class="filter-card">
        <div class="user-search-grid">
          <div class="field"><label>From</label><input id="betFrom" type="date" class="form-control"></div>
          <div class="field"><label>To</label><input id="betTo" type="date" class="form-control"></div>
          <div class="field"><label>Member ID</label><input id="betMemberId" class="form-control" placeholder="Member ID"></div>
          <div class="field"><label>Provider Code</label><input id="betProviderCode" class="form-control" placeholder="Provider Code"></div>
          <div class="field"><label>Game Code</label><input id="betGameCode" class="form-control" placeholder="Game Code"></div>
          <div class="field"><label>Event Type</label><input id="betEventType" class="form-control" placeholder="Event Type"></div>
          <div class="field"><label>&nbsp;</label><button id="betSearchBtn" class="btn-primary-clean w-100" type="button"><i class="bi bi-search"></i> Search</button></div>
        </div>
      </div>
      <div class="table-card">
        <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-graph-up-arrow"></i><span>Bet Report List</span></div></div>
        <div class="table-wrap"><table class="report-table">
          <thead><tr><th>ID</th><th>Member</th><th>Provider</th><th>Game</th><th>Bet ID</th><th>Event</th><th>Bet</th><th>Valid Bet</th><th>Win</th><th>Net</th><th>Created</th></tr></thead>
          <tbody id="betBody"><tr><td colspan="11">Loading...</td></tr></tbody>
        </table></div>
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2"><button class="clean-btn" id="betPrevBtn" type="button">Previous</button><span id="betPager" class="text-muted small"></span><button class="clean-btn" id="betNextBtn" type="button">Next</button></div>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.14"></script>
<script src="assets/js/auth.js?v=1.0.13"></script>
<script src="assets/js/reports.js?v=1.0.8"></script>
<script src="assets/js/provider-bet-report.js"></script>
  <script src="assets/js/bo-date-range.js?v=1.0.2"></script>
</body>
</html>
