<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.16" rel="stylesheet" />
  </head>
  <body class="report-body">
    <div class="report-shell">
      <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
      <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
      <main class="report-main">
        <header class="report-topbar">
          <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-layout-text-window-reverse"></i></div>
                    <div>
                        <h1>Layout Section</h1>
                        <p>Manage frontend layout sections and display configuration.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
        </header>
        <section class="report-content">
          <div class="layout-page-card">
            <div class="section-title layout-page-title">
              <div>
                <h2>Customize Layout</h2>
              </div>
              <div class="layout-editor-actions">
                <button class="clean-btn" id="reloadSectionBtn" type="button"><i class="bi bi-arrow-clockwise"></i> Reload</button>
                <button class="clean-btn primary" id="saveSectionBtn" type="button"><i class="bi bi-save"></i> Save Section</button>
              </div>
            </div>

            <div class="layout-editor-shell">
              <aside class="layout-section-menu" id="layoutSectionMenu">
                <button class="layout-section-item active" type="button" data-section="home">CSS Styling</button>
                <button class="layout-section-item" type="button" data-section="home-before-referral">Home: Before Referrer</button>
                <button class="layout-section-item" type="button" data-section="home-before-social-media">Home: Before Social Media</button>
                <button class="layout-section-item" type="button" data-section="home-after-social-media">Home: After Social Media</button>
                <button class="layout-section-item" type="button" data-section="home-after-account-status">Home: After Account Status</button>
                <button class="layout-section-item" type="button" data-section="home-header">Header, Sidebar, Partnership</button>
              </aside>

              <div class="layout-editor-main">
                <div class="layout-editor-current">
                  Editing: <strong id="currentSectionName">Right Panel</strong>
                  <small id="currentSectionKey">right-panel</small>
                </div>

                <div class="layout-code-grid" id="layoutCodeGrid">
                  <div class="layout-code-pane" data-code-pane="html">
                    <label for="sectionHtmlEditor">HTML</label>
                    <div class="layout-code-editor" data-editor-lang="html">
                      <div class="layout-line-numbers" data-line-for="sectionHtmlEditor">1</div>
                      <div class="layout-code-input-wrap">
                        <pre class="layout-code-highlight" aria-hidden="true"><code></code></pre>
                        <textarea id="sectionHtmlEditor" spellcheck="false" placeholder="Paste HTML code here"></textarea>
                      </div>
                    </div>
                  </div>
                  <div class="layout-code-pane" data-code-pane="css">
                    <label for="sectionCssEditor">CSS</label>
                    <div class="layout-code-editor" data-editor-lang="css">
                      <div class="layout-line-numbers" data-line-for="sectionCssEditor">1</div>
                      <div class="layout-code-input-wrap">
                        <pre class="layout-code-highlight" aria-hidden="true"><code></code></pre>
                        <textarea id="sectionCssEditor" spellcheck="false" placeholder="Paste CSS code here"></textarea>
                      </div>
                    </div>
                  </div>
                  <div class="layout-code-pane" data-code-pane="js">
                    <label for="sectionJsEditor">JS</label>
                    <div class="layout-code-editor" data-editor-lang="js">
                      <div class="layout-line-numbers" data-line-for="sectionJsEditor">1</div>
                      <div class="layout-code-input-wrap">
                        <pre class="layout-code-highlight" aria-hidden="true"><code></code></pre>
                        <textarea id="sectionJsEditor" spellcheck="false" placeholder="Paste JS code here"></textarea>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="custom-status" id="sectionCustomizeStatus"></div>
              </div>
            </div>
          </div>

        </section>
      </main>
    </div>
    <script src="assets/js/config.js?v=1.0.10"></script>
    <script src="assets/js/auth.js?v=1.0.11"></script>
    <script src="assets/js/reports.js?v=1.0.6"></script>
    <script src="assets/js/site-customize.js?v=1.0.2"></script>
  </body>
</html>
