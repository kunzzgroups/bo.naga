<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Chat Templates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.24" rel="stylesheet" />
  </head>
  <body class="report-body livechat-template-page standardized-listing-page">
    <div class="report-shell">
      <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
      <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
      <main class="report-main">
        <header class="report-topbar">
          <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-chat-square-text"></i></div>
                    <div>
                        <h1>Template Messages</h1>
                        <p>Manage reusable response templates for live chat.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
        </header>
        <section class="report-content">
          <div class="livechat-template-layout">
            <section class="card-clean template-form-card">
              <div class="section-title-row">
                <div>
                  <h2 id="templateFormTitle">Add Template</h2>
                </div>
              </div>
              <form id="templateForm" class="template-form">
                <input type="hidden" id="templateId">
                <div class="field">
                  <label>Title</label>
                  <input id="templateTitle" placeholder="Example: Deposit Delay" required>
                </div>
                <div class="field">
                  <label>Message</label>
                  <textarea id="templateMessage" rows="9" placeholder="Type full message here. Paragraphs are supported." required></textarea>
                </div>
                <div class="form-grid-2">
                  <div class="field">
                    <label>Sort Order</label>
                    <input id="templateSortOrder" type="number" value="0">
                  </div>
                  <div class="field">
                    <label>Status</label>
                    <select id="templateStatus">
                      <option value="1">Active</option>
                      <option value="0">Inactive</option>
                    </select>
                  </div>
                </div>
                <div class="template-actions">
                  <button class="btn-primary-clean" type="submit"><i class="bi bi-save"></i> Save Template</button>
                  <button class="clean-btn" type="button" id="templateResetBtn"><i class="bi bi-arrow-counterclockwise"></i> Clear</button>
                  <a class="clean-btn" href="livechat.html"><i class="bi bi-chat-dots"></i> Back To Live Chat</a>
                </div>
                <div class="form-status" id="templateStatusText"></div>
              </form>
            </section>
            <section class="card-clean template-list-card">
              <div class="section-title-row">
                <div>
                  <h2>Template List</h2>
                </div>
                <button class="clean-btn" type="button" id="templateRefreshBtn"><i class="bi bi-arrow-clockwise"></i></button>
              </div>
              <div class="template-list" id="templateList">
                <div class="livechat-empty">Loading templates...</div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>
    <script src="assets/js/config.js?v=1.0.14"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js?v=1.0.0"></script>
    <script src="assets/js/auth.js?v=1.1.1"></script>
    <script src="assets/js/reports.js?v=1.0.9"></script>
    <script src="assets/js/livechat-template.js?v=1.0.0"></script>
      <script src="assets/js/crud-modal-pattern.js?v=1.0.0"></script>
  </body>
</html>
