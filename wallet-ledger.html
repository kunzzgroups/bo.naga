<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wallet Ledger</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.25" rel="stylesheet" />
</head>
<body class="report-body standardized-listing-page wallet-ledger-page">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar">
      <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-journal-check"></i></div>
                    <div>
                        <h1>Wallet Ledger</h1>
                        <p>Review member wallet movements and ledger entries.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
    </header>
    <section class="report-content">
      <div class="quick-stats">
        <div class="metric"><span>Deposit</span><strong id="wlDeposit">0.00</strong></div>
        <div class="metric"><span>Withdraw</span><strong id="wlWithdraw">0.00</strong></div>
        <div class="metric"><span>Transfer</span><strong id="wlTransfer">0.00</strong></div>
        <div class="metric"><span>Bet Win/Lose</span><strong id="wlBetWinLose">0.00</strong></div>
      </div>

      <div class="filter-card">
        <div class="user-search-grid">
          <div class="field"><label>From</label><input type="date" id="ledgerFrom"></div>
          <div class="field"><label>To</label><input type="date" id="ledgerTo"></div>
          <div class="field"><label>Member ID</label><input id="ledgerMemberId" placeholder="Optional"></div>
          <div class="field"><label>Provider</label><input id="ledgerProviderCode" placeholder="LIVE22"></div>
          <div class="field"><label>Type</label><select id="ledgerType"><option value="">All</option><option>DEPOSIT</option><option>WITHDRAW</option><option>ADJUSTMENT</option><option>REFERRAL_REWARD</option><option>TRANSFER_OUT</option><option>TRANSFER_IN</option><option>BET</option><option>WIN</option><option>LOSE</option><option>SETTLE</option><option>ROLLBACK</option></select></div>
          <div class="field"><label>Page Size</label><select id="ledgerSize"><option>20</option><option>50</option><option>100</option></select></div>
          <div class="field ledger-reset-field"><label>&nbsp;</label><button class="clean-btn w-100" id="ledgerResetBtn" type="button"><i class="bi bi-arrow-clockwise"></i> Reset</button></div>
          <div class="field ledger-search-field"><label>&nbsp;</label><button class="btn-primary-clean w-100" id="ledgerSearchBtn" type="button"><i class="bi bi-search"></i> Search</button></div>
        </div>
      </div>

      <div class="table-card">
        <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-receipt"></i><span>Ledger List</span></div><small class="text-muted" id="ledgerPageInfo"></small></div>
        <div class="table-wrap">
          <table class="report-table">
            <thead><tr><th>Date</th><th>Member</th><th>Provider</th><th>Type</th><th>Amount</th><th>Before</th><th>After</th><th>Game</th><th>Reference No</th><th>Status</th></tr></thead>
            <tbody id="walletLedgerBody"><tr><td colspan="10">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
          <button class="clean-btn" type="button" id="ledgerPrevBtn">Previous</button>
          <span id="ledgerPager" class="text-muted small"></span>
          <button class="clean-btn" type="button" id="ledgerNextBtn">Next</button>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.14"></script>
<script src="assets/js/auth.js?v=1.0.13"></script>
<script src="assets/js/reports.js?v=1.0.9"></script>
<script src="assets/js/wallet-ledger.js"></script>
  <script src="assets/js/bo-date-range.js?v=1.0.3"></script>

<!-- Global live-chat listener: keeps the custom MP3 notification active throughout the BO. -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js?v=1.0.0"></script>
<script src="assets/js/livechat-global-notification.js?v=20260724-global-v2"></script>
</body>
</html>
