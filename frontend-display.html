<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frontend Display</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="assets/css/reports.css?v=1.0.24" rel="stylesheet">
<style>
.display-setting-card{width:100%;max-width:980px;margin-left:auto;margin-right:auto}.display-setting-row{display:grid;grid-template-columns:minmax(0,1fr) 240px;gap:24px;align-items:center;padding:20px;border:1px solid #e4e7ec;border-radius:16px;background:#fff}.display-setting-copy h2{font-size:18px;font-weight:900;margin:0 0 6px;color:#182230}.display-setting-copy p{margin:0;color:#667085;font-weight:600}.display-setting-select{width:100%;min-height:46px;border:1px solid #d0d5dd;border-radius:12px;padding:0 14px;background:#fff;font-weight:800;color:#182230}.display-setting-actions{display:flex;justify-content:flex-end;margin-top:16px}.display-setting-actions .clean-btn{min-width:190px}.display-preview-note{margin-top:14px;border-radius:12px;padding:12px 14px;background:#eef2ff;color:#2563eb;font-weight:700}.display-preview-note.off{background:#fff7ed;color:#c2410c}@media(max-width:700px){.display-setting-row{grid-template-columns:1fr}.display-setting-actions{display:grid}.display-setting-actions .clean-btn{width:100%}}
</style>
</head>
<body class="report-body standardized-listing-page">
<div class="report-shell">
<aside class="report-sidebar" id="reportSidebar"><div class="report-brand"><div>Backoffice<br><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i class="bi bi-x-lg"></i></button></div><nav class="report-nav"></nav></aside>
<div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
<main class="report-main">
<header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button><div class="user-title-wrap"><div class="user-title-icon"><i class="bi bi-display"></i></div><div><h1>Frontend Display</h1><p>Control which homepage sections are visible on the TitanXgaming frontend.</p></div></div><div class="report-actions" data-bo-profile></div></header>
<section class="report-content">
<div class="table-card display-setting-card">
  <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-house-gear"></i><span>Homepage Display</span></div></div>
  <div class="display-setting-row">
    <div class="display-setting-copy">
      <h2>Bonus Display</h2>
      <p>Enable or disable the bonus and promotion column displayed on the TitanXgaming frontend main page.</p>
    </div>
    <select id="homeBonusEnabled" class="display-setting-select" aria-label="Bonus display status">
      <option value="1">Enabled</option>
      <option value="0">Disabled</option>
    </select>
  </div>
  <div class="display-preview-note" id="displaySettingNote">Loading current setting...</div>
  <div class="display-setting-actions"><button class="clean-btn primary" id="saveFrontendDisplay" type="button"><i class="bi bi-save"></i> Save Setting</button></div>
  <div id="frontendDisplayMessage" class="upload-status mt-2"></div>
</div>
</section>
</main>
</div>
<script src="assets/js/config.js?v=1.0.14"></script><script src="assets/js/reports.js?v=1.0.9"></script><script src="assets/js/auth.js?v=1.0.13"></script><script src="assets/js/frontend-display.js?v=1.0.1"></script>
</body></html>
