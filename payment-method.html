<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Method Config</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.16" rel="stylesheet" />
</head>

<body class="report-body standardized-listing-page">
    <div class="report-shell">
        <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
        <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
        <main class="report-main">
            <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-bank"></i></div>
                    <div>
                        <h1>Payment Method Config</h1>
                        <p>Manage payment methods, account details and availability.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
            </header>
            <section class="report-content">
                <div class="row g-3">
                    <div class="col-lg-5">
                        <div class="filter-card">
                            <h5 id="pmFormTitle">Create Payment Method</h5>
                            <form id="pmForm" class="user-search-grid" style="grid-template-columns:1fr 1fr"><input
                                    type="hidden" id="pmId">
                                <div class="field"><label>Method Type</label><select id="pmType">
                                        <option value="ONLINE_BANKING">Online Banking</option>
                                        <option value="EWALLET">E-Wallet</option>
                                        <option value="CARD">Card</option>
                                    </select></div>
                                <div class="field"><label>Status</label><select id="pmStatus">
                                        <option value="1">Active</option>
                                        <option value="0">Inactive</option>
                                    </select></div>
                                <div class="field"><label>Display Name</label><input id="pmName"
                                        placeholder="PayID / Maybank / E-Wallet"></div>
                                <div class="field"><label>Subtitle</label><input id="pmSubtitle"
                                        placeholder="Fast deposit"></div>
                                <div class="field"><label>Bank Name</label><input id="pmBankName"
                                        placeholder="Bank name"></div>
                                <div class="field"><label>Account Name</label><input id="pmAccountName"
                                        placeholder="Account holder"></div>
                                <div class="field"><label>Account Number</label><input id="pmAccountNo"
                                        placeholder="Account number"></div>
                                <div class="field"><label>Bank BSB</label><input id="pmBsb" placeholder="BSB"></div>
                                <div class="field"><label>Pay ID</label><input id="pmPayId" placeholder="Pay ID"></div>
                                <div class="field"><label>Sort Order</label><input id="pmSort" type="number" value="0">
                                </div>
                                <div class="field"><label>Min Amount</label><input id="pmMin" type="number" step="0.01"
                                        value="10"></div>
                                <div class="field"><label>Max Amount</label><input id="pmMax" type="number" step="0.01"
                                        value="0"></div>
                                <div class="field" style="grid-column:1/-1"><label>QR / E-wallet Image</label><input
                                        id="pmQr" type="file" accept="image/*" class="form-control"></div>
                                <div class="field" style="grid-column:1/-1"><label>Instructions</label><textarea
                                        id="pmInstructions" rows="4"
                                        placeholder="Payment instructions shown on Naga deposit page"></textarea></div>
                                <div class="field"><button class="btn-primary-clean w-100" type="submit">Save</button>
                                </div>
                                <div class="field"><button class="clean-btn w-100" type="button"
                                        id="pmReset">Reset</button></div>
                            </form>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="table-card">
                            <div class="user-toolbar mb-3">
                                <div class="user-badge"><i class="bi bi-credit-card"></i><span>Payment Methods</span>
                                </div><button class="clean-btn" id="pmRefresh" type="button"><i
                                        class="bi bi-arrow-clockwise"></i> Refresh</button>
                            </div>
                            <div class="table-wrap">
                                <table class="report-table">
                                    <thead>
                                        <tr>
                                            <th>Order</th>
                                            <th>Type</th>
                                            <th>Display</th>
                                            <th>Details</th>
                                            <th>QR</th>
                                            <th>Status</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="pmBody">
                                        <tr>
                                            <td colspan="7">Loading...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/config.js?v=1.0.10"></script>
    <script src="assets/js/auth.js?v=1.0.11"></script>
    <script src="assets/js/reports.js?v=1.0.6"></script>
    <script src="assets/js/payment-method.js"></script>
    <script src="assets/js/crud-modal-pattern.js?v=1.0.0"></script>
  </body>

</html>
