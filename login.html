<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/reports.css" rel="stylesheet" />
</head>
<body class="report-body">
  <main class="auth-page">
    <section class="auth-card">
      <h1>Backoffice Login</h1>
      <p class="text-muted">Secure admin login with token.</p>
      <form id="adminLoginForm">
        <label>Username</label>
        <input class="form-control mb-3" id="adminUsername" autocomplete="username" required>
        <label>Password</label>
        <input class="form-control mb-3" id="adminPassword" type="password" autocomplete="current-password" required>
        <div class="upload-status mb-3" id="adminLoginStatus"></div>
        <button class="btn btn-primary w-100" id="adminLoginBtn" type="submit">Login</button>
      </form>
    </section>
  </main>
  <script src="assets/js/config.js?v=1.0.4"></script>
  <script src="assets/js/auth.js?v=1.0.8"></script>
  <script src="assets/js/admin-login.js?v=1.0.0"></script>
</body>
</html>
