<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Role</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.16" rel="stylesheet" />
</head>

<body class="report-body standardized-listing-page" data-access-page="role">
    <div class="report-shell">
        <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
        <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
        <main class="report-main">
            <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-person-badge"></i></div>
                    <div>
                        <h1>Role Management</h1>
                        <p>Manage administrator roles and access assignments.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
            </header>
            <section class="report-content">
                <div class="access-grid">
                    <div class="access-card">
                        <h2>Add / Update Role</h2><br>
                        <form id="accessForm"><label>Code</label><input id="code" class="form-control mb-3"
                                placeholder="manager" required><label>Name</label><input id="name"
                                class="form-control mb-3" placeholder="Manager" required><label>Remark</label><input
                                id="remark" class="form-control mb-3"><label>Status</label><select id="status"
                                class="form-control mb-3">
                                <option value="1">Active</option>
                                <option value="0">Inactive</option>
                            </select>
                            <div id="accessStatus" class="upload-status mb-3"></div><button class="clean-btn primary"><i
                                    class="bi bi-save"></i> Save Role</button>
                        </form>
                    </div>
                    <div class="access-card">
                        <h2>Role List</h2><br>
                        <div class="table-wrap">
                            <table class="report-table">
                                <thead>
                                    <tr>
                                        <th>Role</th>
                                        <th>Remark</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody id="accessTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/config.js?v=1.0.10"></script>
    <script src="assets/js/reports.js?v=1.0.6"></script>
    <script src="assets/js/auth.js?v=1.0.11"></script>
    <script src="assets/js/access-management.js?v=1.0.1"></script>
</body>

</html>
