<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deposit Approval</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.17" rel="stylesheet" />
</head>
<body class="report-body standardized-listing-page">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar">
      <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-wallet2"></i></div>
                    <div>
                        <h1>Deposit Approval</h1>
                        <p>Review and process member deposit requests.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
    </header>
    <section class="report-content">
      <div class="quick-stats">
        <div class="metric"><span>Pending Count</span><strong id="wdPendingCount">0</strong></div>
        <div class="metric"><span>Pending Amount</span><strong id="wdPendingAmount">0.00</strong></div>
        <div class="metric"><span>Approved Amount</span><strong id="wdApprovedAmount">0.00</strong></div>
        <div class="metric"><span>Rejected Count</span><strong id="wdRejectedCount">0</strong></div>
      </div>

      <div class="filter-card">
        <div class="user-search-grid">
          <div class="field"><label>Search</label><input id="depositKeyword" placeholder="Username / mobile / bank / reference"></div>
          <div class="field"><label>Status</label><select id="depositStatus"><option value="PENDING">Pending</option><option value="APPROVED">Approved</option><option value="REJECTED">Rejected</option><option value="">All</option></select></div>
          <div class="field"><label>Page Size</label><select id="depositSize"><option>20</option><option>50</option><option>100</option></select></div>
          <div class="field"><label>&nbsp;</label><button class="btn-primary-clean w-100" id="depositSearchBtn" type="button">Search</button></div>
          <div class="field"><label>&nbsp;</label><button class="clean-btn w-100" id="depositResetBtn" type="button"><i class="bi bi-arrow-clockwise"></i> Reset</button></div>
        </div>
      </div>

      <div class="table-card">
        <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-cash-coin"></i><span>Deposit Requests</span></div><small class="text-muted" id="depositPageInfo"></small></div>
        <div class="table-wrap">
          <table class="report-table">
            <thead><tr>
              <th>Date</th><th>Member</th><th>Amount</th><th>Method</th><th>Proof</th><th>Reference</th><th>Status</th><th>Processed</th><th>Action</th>
            </tr></thead>
            <tbody id="depositBody"><tr><td colspan="9">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
          <button class="clean-btn" type="button" id="depositPrevBtn">Previous</button>
          <span id="depositPager" class="text-muted small"></span>
          <button class="clean-btn" type="button" id="depositNextBtn">Next</button>
        </div>
      </div>
    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.10"></script>
<script src="assets/js/auth.js?v=1.0.11"></script>
<script src="assets/js/reports.js?v=1.0.7"></script>
<script src="assets/js/member-deposit.js"></script>
</body>
</html>
