<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu Permission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.27" rel="stylesheet" />
</head>

<body class="report-body standardized-listing-page" data-access-page="menu-permission">
    <div class="report-shell">
        <aside class="report-sidebar" id="reportSidebar">
          <div class="report-brand">
              <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                      class="bi bi-x-lg"></i></button>
          </div>
          <nav class="report-nav"></nav>
      </aside>
        <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
        <main class="report-main">
            <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-list-check"></i></div>
                    <div>
                        <h1>Menu Permission</h1>
                        <p>Configure menu access for administrator roles.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
            </header>
            <section class="report-content">
                <div class="access-card">
                    <h2>Menu Permission</h2><br>
                    <form id="accessForm"><label>Role</label><select id="roleSelect" class="form-control mb-3"></select>
                        <div id="checkList" class="perm-list mb-3"></div>
                        <div id="accessStatus" class="upload-status mb-3"></div><button class="clean-btn primary"><i
                                class="bi bi-save"></i> Save Menu Permission</button>
                    </form>
                </div>
                <div class="access-card mt-4">
                    <h2>Menu Config</h2><br>
                    <div class="table-wrap">
                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th>Menu</th>
                                    <th>URL</th>
                                    <th>Parent</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="menuTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/config.js?v=1.0.14"></script>
    <script src="assets/js/reports.js?v=1.0.8"></script>
    <script src="assets/js/auth.js?v=1.0.13"></script>
    <script src="assets/js/access-management.js?v=1.0.1"></script>
</body>

</html>
