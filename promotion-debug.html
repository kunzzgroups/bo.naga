<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Promotion Debug</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="assets/css/reports.css?v=1.0.14" rel="stylesheet" />
    <style>
        .debug-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 12px
        }

        .debug-card {
            background: #fff;
            border: 1px solid #d9e2ef;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, .05)
        }

        .debug-card b {
            display: block;
            font-size: 22px;
            color: #0f2b55
        }

        .progress-mini {
            height: 8px;
            background: #edf2f7;
            border-radius: 50px;
            overflow: hidden;
            min-width: 140px
        }

        .progress-mini span {
            display: block;
            height: 100%;
            background: #0d6efd;
            border-radius: 50px
        }

        .debug-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .debug-actions button {
            border: 1px solid #d9e2ef;
            background: #fff;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            font-weight: 700
        }

        .debug-actions button.primary {
            background: #0d6efd;
            color: #fff
        }

        .debug-actions button.warn {
            background: #fff7ed;
            color: #c2410c
        }

        .debug-actions button.danger {
            background: #fee2e2;
            color: #b91c1c
        }

        .debug-actions button.success {
            background: #dcfce7;
            color: #166534
        }

        .debug-filter {
            display: grid;
            grid-template-columns: 1fr 180px 160px auto;
            gap: 12px
        }

        .debug-status {
            margin-top: 12px;
            font-weight: 700
        }

        .debug-status.ok {
            color: #16a34a
        }

        .debug-status.err {
            color: #dc2626
        }

        .nowrap {
            white-space: nowrap
        }

        @media(max-width:900px) {

            .debug-grid,
            .debug-filter {
                grid-template-columns: 1fr
            }

            .table-wrap {
                overflow: auto
            }
        }
    </style>
</head>

<body class="report-body standardized-listing-page">
    <div class="report-shell">
        <aside class="report-sidebar" id="reportSidebar">
            <div class="report-brand">
                <div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i
                        class="bi bi-x-lg"></i></button>
            </div>
            <nav class="report-nav"></nav>
        </aside>
        <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
        <main class="report-main">
            <header class="report-topbar"><button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
                <div class="user-title-wrap">
                    <div class="user-title-icon"><i class="bi bi-journal-text"></i></div>
                    <div>
                        <h1>Promotion Log</h1>
                        <p>Review promotion processing activity and diagnostic records.</p>
                    </div>
                </div>
                <div class="report-actions" data-bo-profile></div>
            </header>
            <section class="report-content">
                <div class="debug-grid mb-3">
                    <div class="debug-card"><span>Total Claims</span><b id="dbgTotal">0</b></div>
                    <div class="debug-card"><span>Active</span><b id="dbgActive">0</b></div>
                    <div class="debug-card"><span>Completed</span><b id="dbgCompleted">0</b></div>
                    <div class="debug-card"><span>Forfeited</span><b id="dbgForfeited">0</b></div>
                </div>
                <div class="filter-card mb-3">
                    <div class="debug-filter">
                        <div class="field"><label>Member Username / Mobile</label><input id="dbgKeyword"
                                placeholder="e.g. test001 or mobile"></div>
                        <div class="field"><label>Status</label><select id="dbgStatus">
                                <option value="">All</option>
                                <option value="ACTIVE">Active</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="FORFEITED">Forfeited</option>
                            </select></div>
                        <div class="field"><label>Promotion ID</label><input id="dbgPromotionId" type="number"
                                placeholder="optional"></div>
                        <div class="field"><label>&nbsp;</label><button class="btn-primary-clean w-100"
                                id="dbgSearchBtn" type="button"><i class="bi bi-search"></i> Search</button></div>
                    </div>
                    <div class="debug-status" id="dbgMsg"></div>
                </div>
                <div class="table-card">
                    <div class="user-toolbar mb-3">
                        <div class="user-badge"><i class="bi bi-gift"></i><span>Promotion Claim</span></div>
                        <div class="user-toolbar-actions"><button class="clean-btn" type="button" id="dbgSyncBetLogsBtn"><i
                                    class="bi bi-database-check"></i> Sync Bet Logs</button><button class="clean-btn" type="button" id="dbgRefreshBtn"><i
                                    class="bi bi-arrow-clockwise"></i> Refresh</button><a class="clean-btn"
                                href="promotion.html"><i class="bi bi-plus-circle"></i> Create Promotion</a></div>
                    </div>
                    <div class="table-wrap">
                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Member</th>
                                    <th>Promotion</th>
                                    <th>Bonus</th>
                                    <th>Turnover</th>
                                    <th>Rollover</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="dbgRows">
                                <tr>
                                    <td colspan="9">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="assets/js/config.js?v=1.0.10"></script>
    <script src="assets/js/auth.js?v=1.0.11"></script>
    <script src="assets/js/reports.js?v=1.0.5"></script>
    <script src="assets/js/promotion-debug.js?v=1.0.1"></script>
</body>

</html>
