<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bonus Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="assets/css/reports.css?v=1.0.12" rel="stylesheet" />
</head>
<body class="report-body" data-report-page="bonus">
<div class="report-shell">
  <aside class="report-sidebar" id="reportSidebar">
    <div class="report-brand"><div>Backoffice<br /><small>Admin Panel</small></div><button class="close-side" data-close-sidebar><i class="bi bi-x-lg"></i></button></div>
    <nav class="report-nav"></nav>
  </aside>
  <div class="sidebar-overlay" id="reportOverlay" data-close-sidebar></div>
  <main class="report-main">
    <header class="report-topbar">
      <button class="hamb" data-open-sidebar><i class="bi bi-list"></i></button>
      <div><h1 data-report-title>Bonus Report</h1></div>
      <div class="report-actions" data-bo-profile></div>
    </header>
    <section class="report-content">
      <div class="filter-card">
        <div class="user-search-grid">
          <div class="field"><label>Report Period</label><select id="casinoPeriod"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="custom">Custom Date</option></select></div>
          <div class="field"><label>From</label><input type="date" id="casinoFrom"></div>
          <div class="field"><label>To</label><input type="date" id="casinoTo"></div>
          <div class="field"><label>&nbsp;</label><button type="button" class="btn-primary-clean w-100" id="casinoSearchBtn"><i class="bi bi-search"></i> Search</button></div>
          <div class="field"><label>&nbsp;</label><button type="button" class="clean-btn w-100" id="casinoResetBtn"><i class="bi bi-arrow-clockwise"></i> Today</button></div>
        </div>
        <small class="text-muted" id="casinoRangeText">-</small>
      </div>

      <div class="table-card mb-3">
        <div class="user-toolbar mb-3"><div class="user-badge"><i class="bi bi-gift"></i><span>Bonus Report</span></div></div>
        <div class="table-wrap"><table class="report-table"><thead><tr><th>Date</th><th>Reference / Promotion</th><th>Members</th><th>Claims</th><th>Amount</th></tr></thead><tbody id="crBonusBody"><tr><td colspan="5">Loading...</td></tr></tbody></table></div>
      </div>

    </section>
  </main>
</div>
<script src="assets/js/config.js?v=1.0.10"></script>
<script src="assets/js/auth.js?v=1.0.10"></script>
<script src="assets/js/reports.js?v=1.0.12"></script>
<script src="assets/js/casino-report.js?v=1.0.12"></script>
</body>
</html>
